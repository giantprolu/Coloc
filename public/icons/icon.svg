<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#6366f1"/>
  <g transform="translate(256,256)">
    <!-- House shape -->
    <path d="M0-140 L120,20 L120,140 L-120,140 L-120,20 Z" fill="white" opacity="0.95"/>
    <!-- Roof -->
    <path d="M-150,20 L0,-140 L150,20" fill="none" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Door -->
    <rect x="-30" y="50" width="60" height="90" rx="8" fill="#6366f1"/>
    <!-- Window left -->
    <rect x="-90" y="40" width="40" height="40" rx="6" fill="#6366f1" opacity="0.7"/>
    <!-- Window right -->
    <rect x="50" y="40" width="40" height="40" rx="6" fill="#6366f1" opacity="0.7"/>
    <!-- Calendar dot -->
    <circle cx="70" cy="-80" r="28" fill="#f59e0b"/>
    <text x="70" y="-72" text-anchor="middle" font-size="28" font-weight="bold" fill="white" font-family="Arial">E</text>
  </g>
</svg>
